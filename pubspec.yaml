name: zalo_account_workspace
description: "Desktop workspace for managing isolated Zalo account browser profiles."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  google_fonts: ^6.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.3
  webview_cef:
    path: packages/webview_cef

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/zalo_selectors.json
    - assets/icons/app_logo.png
