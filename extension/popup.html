<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>Campaio Bridge</title>
  <style>
    body { font-family: -apple-system, "Inter", Segoe UI, Helvetica, Arial, sans-serif; width: 280px; padding: 14px; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    button { width: 100%; padding: 8px; font: inherit; background: #1f6feb; color: #fff; border: 0; border-radius: 6px; cursor: pointer; margin-top: 6px; }
    button:hover { background: #1858bf; }
    .secondary { background: #fff; color: #1f6feb; border: 1px solid #1f6feb; }
    .status { font-size: 12px; color: #555; margin-top: 10px; min-height: 16px; }
    a { color: #1f6feb; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Campaio Bridge</h1>
  <button id="openAppBtn">Mở app desktop</button>
  <button id="checkAppBtn" class="secondary">Kiểm tra app online</button>
  <button id="syncBtn">Đồng bộ ngay</button>
  <button id="pollBtn" class="secondary">Kiểm tra outbox</button>
  <div id="status" class="status"></div>
  <p><a href="#" id="optionsLink">Cấu hình tenant URL + API key</a></p>
  <script src="desktop_bridge.js"></script>
  <script src="popup.js"></script>
</body>
</html>
